<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treact</title>
    <link rel="stylesheet" href="styles.css" />
    <script
      src="https://kit.fontawesome.com/534fbe0e0c.js"
      crossorigin="anonymous"
    ></script>
    <script src="index.js"></script>
  </head>

  <body>
    <section id="landing">
      <nav>
        <div class="row nav__row">
          <div class="nav__logo">
            <figure class="nav__img--wrapper">
              <img
                src="./assets/logo.2c489fc453a1783cbadacf914efa3df6.svg"
                class="nav__img"
              />
            </figure>
            <div class="nav__logo--title">Treact</div>
          </div>
          <ul class="nav__links">
            <a href="#" class="nav__link">About</a>
            <a href="#" class="nav__link">Blog</a>
            <a href="#" class="nav__link">Pricing</a>
            <a href="#" class="nav__link">Contact Us</a>
            <a href="#" class="nav__link login">Login</a>
            <button class="nav__link nav__link--button nav__link-url--primary">
              Sign Up
            </button>
          </ul>
        </div>
      </nav>

      <header>
        <div class="container ">
          <div class="row header__container">
            <div class="row__info">
              <h1 class="header__info--title">
                Beautiful React Templates
                <span class="text--purple">for you.</span>
              </h1>
              <p class="header__info--para">
                Our templates are easy to setup, understand and customize. Fully
                modular components with a variety of pages and components.
              </p>
              <div class="header__form">
                <input type="email" class="header__form--input" placeholder="Your E-mail Address"></input>
                <button class="header__form--button">Get Started</button>
              </div>
              <p class="header__img-text">OUT TRUSTED CUSTOMERS</p>
              <figure class="header__customer-img--wrapper">
                <img
                  src="./assets/customers-logo-strip.680ac7c2e8ae28161d2c.png"
                  class="header__customer-img"
                />
              </figure>
            </div>
            <div class="row__img">
              <img
                src="./assets/design-illustration-2.6da6a00b20c07c4a9b65d1870679e1b8.svg"
                class="row__img--svg"
              />
            </div>
          </div>
        </div>
      </header>
    </section>
  </body>
</html>
